<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Kalli Penne</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #ff3366; /* Elegant Rose Red */
            --bg: #fffbfb;
            --text-main: #333333;
            --heart-thickness: 12; /* Controls how THICK the elegant heart border is */
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
            color: var(--text-main);
        }

        .container {
            width: 90%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Typewriter text styling (Screen 1) */
        #typewriter {
            font-size: 1.5rem;
            font-weight: 700;
            min-height: 80px;
            margin-bottom: 2rem;
            line-height: 1.3;
        }

        .btn-group {
            position: relative;
            height: 150px;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        button {
            padding: 16px 35px;
            border-radius: 12px;
            border: none;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #yes-btn {
            background: var(--accent);
            color: white;
            z-index: 10;
        }

        #no-btn {
            background: #f1f2f6;
            color: #888;
        }

        /* Success Screen */
        #success-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.8s ease-out;
        }

        .image-reveal-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }

        .image-reveal-wrapper img {
            width: 90%; /* Picture is slightly smaller than the container to allow border space */
            height: 90%;
            object-fit: cover;
            border-radius: 20px;
            display: block;
            z-index: 1;
        }

        /* The Bold, Animated Heart SVG Border */
        .heart-svg-border {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            fill: none;
            stroke: var(--accent);
            stroke-width: var(--heart-thickness);
            stroke-linecap: round;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            z-index: 2;
            pointer-events: none;
        }

        @keyframes drawHeart {
            to { stroke-dashoffset: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Typewriter (Screen 2) */
        #final-text {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--accent);
            padding: 0 10px;
            line-height: 1.3;
        }

        .floating-heart {
            position: absolute;
            font-size: 1.5rem;
            pointer-events: none;
            animation: float 4s linear forwards;
            z-index: 0;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="entry-screen" class="container">
        <div id="typewriter"></div>
        <div class="btn-group">
            <button id="yes-btn" onclick="celebrate()">YES</button>
            <button id="no-btn" onclick="shrinkNo()">NO</button>
        </div>
    </div>

    <div id="success-screen" class="container">
        <div class="image-reveal-wrapper">
            <svg class="heart-svg-border" id="heart-path" viewBox="0 0 500 500">
                <path d="M250,110 C200,30 30,80 30,220 C30,360 250,490 250,490 C250,490 470,360 470,220 C470,80 300,30 250,110 Z" />
            </svg>
            <img src="https://scontent.ftrv3-1.fna.fbcdn.net/v/t1.15752-9/630520134_1393992945833963_3343584208913281510_n.png?stp=dst-png_s960x960&_nc_cat=111&ccb=1-7&_nc_sid=9f807c&_nc_ohc=DID1WS5LOZsQ7kNvwEPF4j9&_nc_oc=Adox_YGgG0FixkqO2IzUd_nIfStqI-HVd2EnU2l8KKyWiS41z_WnE2V_Al0XlP7boiA&_nc_zt=23&_nc_ht=scontent.ftrv3-1.fna&_nc_ss=7a32e&oh=03_Q7cD4wGGgX0GQipwcuv5UMcWouQ7rdFz6QZLTZhc_NnQRFtLeg&oe=69E99A48" alt="Us">
        </div>
        <div id="final-text"></div>
    </div>

    <script>
        const qText = "Q) Do you still love rajuttan, Be honest.";
        const fText = "I knew you were obsessed with rajuttan, kalli penne!";
        let charIndex = 0;

        function type(text, elementId, speed, callback) {
            if (charIndex < text.length) {
                document.getElementById(elementId).innerHTML += text.charAt(charIndex);
                charIndex++;
                setTimeout(() => type(text, elementId, speed, callback), speed);
            } else if (callback) {
                callback();
            }
        }

        window.onload = () => type(qText, "typewriter", 60);

        let noScale = 1;
        let yesScale = 1;

        function shrinkNo() {
            const noBtn = document.getElementById('no-btn');
            const yesBtn = document.getElementById('yes-btn');
            noScale -= 0.15;
            yesScale += 0.25;
            if (noScale <= 0.2) {
                noBtn.style.display = 'none';
            } else {
                noBtn.style.transform = `scale(${noScale})`;
            }
            yesBtn.style.transform = `scale(${yesScale})`;
            spawnHeart();
        }

        function celebrate() {
            document.getElementById('entry-screen').style.display = 'none';
            document.getElementById('success-screen').style.display = 'flex';
            
            // Reset for final typing
            charIndex = 0;
            
            // Step 1: Type the final message first
            type(fText, "final-text", 50, () => {
                // Step 2: Once typing is complete, elegant reveal of the thick border
                const heart = document.getElementById('heart-path');
                // 2.0s duration gives it that premium, drawn feel
                heart.style.animation = "drawHeart 2.0s ease-out forwards";
            });
            
            setInterval(spawnHeart, 300);
        }
