<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For You</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #fff5f6;
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
        }

        .container { width: 90%; max-width: 400px; position: relative; z-index: 10; }

        /* Screen 1 */
        #typewriter {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 2rem;
            color: #333;
            min-height: 80px;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            height: 100px;
            position: relative;
        }

        button {
            padding: 15px 35px;
            border-radius: 15px;
            border: none;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            z-index: 50; /* Forces buttons to be clickable */
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        #yes-btn { background: #ff3366; color: white; }
        #no-btn { background: #fff; color: #888; transition: 0.2s; }

        /* Screen 2 */
        #success-screen { display: none; flex-direction: column; align-items: center; }
        
        .img-box {
            position: relative;
            width: 280px;
            height: 280px;
            margin-bottom: 20px;
        }

        .img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px;
            border: 5px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        #final-text { color: #ff3366; font-size: 1.3rem; font-weight: 700; margin-top: 15px; }

        /* THE HEART BORDER */
        #heart-svg {
            position: absolute;
            top: -15px;
            left: -15px;
            width: 310px;
            height: 310px;
            fill: none;
            stroke: #ff3366;
            stroke-width: 10;
            stroke-linecap: round;
            stroke-dasharray: 1500;
            stroke-dashoffset: 1500;
            pointer-events: none; /* Crucial: mouse clicks go THROUGH this */
        }

        @keyframes draw { to { stroke-dashoffset: 0; } }

        .sparkle { position: absolute; pointer-events: none; animation: fly 3s linear forwards; }
        @keyframes fly { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100vh); opacity: 0; } }
    </style>
</head>
<body>

    <div id="entry-screen" class="container">
        <div id="typewriter"></div>
        <div class="btn-container">
            <button id="yes-btn" onclick="celebrate()">YES</button>
            <button id="no-btn" onclick="shrinkNo()" onmouseover="shrinkNo()">NO</button>
        </div>
    </div>

    <div id="success-screen" class="container">
        <div class="img-box">
            <svg id="heart-svg" viewBox="0 0 500 500">
                <path d="M250,110 C200,30 30,80 30,220 C30,360 250,490 250,490 C250,490 470,360 470,220 C470,80 300,30 250,110 Z" />
            </svg>
            <img src="https://scontent.ftrv3-1.fna.fbcdn.net/v/t1.15752-9/630520134_1393992945833963_3343584208913281510_n.png?_nc_cat=111&ccb=1-7&_nc_sid=fc17b8&efg=eyJxZV9ncm91cHMiOlsiaWdkX2Jlc3RfZWZmb3J0X2ltYWdlOmNvbnRyb2wiXX0%3D&_nc_ohc=DID1WS5LOZsQ7kNvwEPF4j9&_nc_oc=Adox_YGgG0FixkqO2IzUd_nIfStqI-HVd2EnU2l8KKyWiS41z_WnE2V_Al0XlP7boiA&_nc_zt=23&_nc_ht=scontent.ftrv3-1.fna&_nc_ss=7a32e&oh=03_Q7cD4wHGKMlsUmok-rfzm6lJXB-ljYTa1VXAf5h1GnLODi2jNw&oe=69E99A48">
        </div>
        <div id="final-text"></div>
    </div>

    <script>
        const q = "Q) Do you still love rajuttan, Be honest.";
        const f = "I knew you were obsessed with rajuttan, kalli penne!";
        let i = 0;

        // Typewriter function
        function type(txt, ele, speed, cb) {
            if (i < txt.length) {
                document.getElementById(ele).innerHTML += txt.charAt(i);
                i++;
                setTimeout(() => type(txt, ele, speed, cb), speed);
            } else if (cb) { cb(); }
        }

        // Start Question on Load
        window.onload = () => {
            document.getElementById('typewriter').innerHTML = ""; 
            type(q, "typewriter", 50);
        };

        let s = 1;
        function shrinkNo() {
            const no = document.getElementById('no-btn');
            const yes = document.getElementById('yes-btn');
            s -= 0.15;
            if (s <= 0.2) { no.style.display = 'none'; }
            else { no.style.transform = `scale(${s})`; }
            yes.style.transform = `scale(${2 - s})`; // Yes grows as No shrinks
        }

        function celebrate() {
            document.getElementById('entry-screen').style.display = 'none';
            document.getElementById('success-screen').style.display = 'flex';
            i = 0;
            type(f, "final-text", 50, () => {
                document.getElementById('heart-svg').style.animation = "draw 2.5s forwards";
                setInterval(makeHeart, 300);
            });
        }

        function makeHeart() {
            const h = document.createElement('div');
            h.innerHTML = '❤️';
            h.className = 'sparkle';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.top = '100vh';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 3000);
        }
    </script>
</body>
</html>
