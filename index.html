<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #ff4d6d;
            --bg: #fffbfb;
            --text-main: #2d3436;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            font-family: 'Space Grotesk', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .container {
            width: 85%;
            max-width: 400px;
            position: relative;
        }

        #typewriter {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-main);
            min-height: 80px;
            margin-bottom: 2rem;
            letter-spacing: -0.5px;
        }

        .btn-group {
            position: relative;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        button {
            padding: 18px 35px;
            border-radius: 12px; /* Square-ish modern corners */
            border: none;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #yes-btn { background: var(--accent); color: white; box-shadow: 0 10px 20px rgba(255, 77, 109, 0.3); }
        #no-btn { background: #f1f2f6; color: #a4b0be; }

        /* Success Screen */
        #success-screen { display: none; flex-direction: column; align-items: center; }

        .image-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            margin-bottom: 30px;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 20px;
            display: block;
        }

        /* The Animated Heart Border */
        .heart-svg {
            position: absolute;
            top: -10px;
            left: -10px;
            width: 300px;
            height: 300px;
            fill: none;
            stroke: var(--accent);
            stroke-width: 4;
            stroke-linecap: round;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            pointer-events: none;
        }

        @keyframes drawHeart {
            to { stroke-dashoffset: 0; }
        }

        #final-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            margin-top: 10px;
            padding: 0 10px;
        }

        .floating-heart {
            position: absolute;
            font-size: 1.5rem;
            pointer-events: none;
            animation: float 4s linear forwards;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0); opacity: 1; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="entry-screen" class="container">
        <div id="typewriter"></div>
        <div class="btn-group">
            <button id="yes-btn" onclick="celebrate()">YES</button>
            <button id="no-btn" onclick="shrinkNo()">NO</button>
        </div>
    </div>

    <div id="success-screen" class="container">
        <div class="image-wrapper">
            <svg class="heart-svg" id="heart-path" viewBox="0 0 500 500">
                <path d="M250,130 C200,50 50,100 50,230 C50,350 250,470 250,470 C250,470 450,350 450,230 C450,100 300,50 250,130 Z" />
            </svg>
            <img src="https://scontent.ftrv3-1.fna.fbcdn.net/v/t1.15752-9/630520134_1393992945833963_3343584208913281510_n.png?stp=dst-png_s960x960&_nc_cat=111&ccb=1-7&_nc_sid=9f807c&_nc_ohc=DID1WS5LOZsQ7kNvwEPF4j9&_nc_oc=Adox_YGgG0FixkqO2IzUd_nIfStqI-HVd2EnU2l8KKyWiS41z_WnE2V_Al0XlP7boiA&_nc_zt=23&_nc_ht=scontent.ftrv3-1.fna&_nc_ss=7a32e&oh=03_Q7cD4wGGgX0GQipwcuv5UMcWouQ7rdFz6QZLTZhc_NnQRFtLeg&oe=69E99A48" alt="Us">
        </div>
        <div id="final-text"></div>
    </div>

    <script>
        const qText = "Q) Do you still love rajuttan, Be honest.";
        const fText = "I knew you were obsessed with rajuttan, kalli penne!";
        let charIndex = 0;

        function type(text, elementId, speed, callback) {
            if (charIndex < text.length) {
                document.getElementById(elementId).innerHTML += text.charAt(charIndex);
                charIndex++;
                setTimeout(() => type(text, elementId, speed, callback), speed);
            } else if (callback) {
                callback();
            }
        }

        window.onload = () => type(qText, "typewriter", 60);

        let noScale = 1;
        let yesScale = 1;

        function shrinkNo() {
            const noBtn = document.getElementById('no-btn');
            const yesBtn = document.getElementById('yes-btn');
            noScale -= 0.15;
            yesScale += 0.25;
            if (noScale <= 0.2) {
                noBtn.style.display = 'none';
            } else {
                noBtn.style.transform = `scale(${noScale})`;
            }
            yesBtn.style.transform = `scale(${yesScale})`;
            spawnHeart();
        }

        function celebrate() {
            document.getElementById('entry-screen').style.display = 'none';
            document.getElementById('success-screen').style.display = 'flex';
            
            charIndex = 0;
            // Type the text first
            type(fText, "final-text", 50, () => {
                // After typing finishes, draw the heart slowly
                const heart = document.getElementById('heart-path');
                heart.style.animation = "drawHeart 2.5s ease-out forwards";
            });
            
            setInterval(spawnHeart, 300);
        }

        function spawnHeart() {
            const h = document.createElement('div');
            h.className = 'floating-heart';
            h.innerHTML = ['❤️', '✨', '💖'][Math.floor(Math.random() * 3)];
            h.style.left = Math.random() * 100 + 'vw';
            h.style.top = '100vh';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 4000);
        }
    </script>
</body>
</html>
