<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For You ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff3366;
            --glass: rgba(255, 255, 255, 0.85);
            --shadow: 0 12px 40px rgba(255, 51, 102, 0.15);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            padding: 0;
            background: #fffafa;
            background-image: radial-gradient(#ffe0e6 1px, transparent 1px);
            background-size: 20px 20px; /* Subtle aesthetic dots */
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #333;
        }

        #entry-screen {
            text-align: center;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            transition: opacity 0.5s ease;
        }

        #typewriter {
            font-size: 1.7rem;
            font-weight: 800;
            margin-bottom: 2.5rem;
            min-height: 90px;
            color: #2d3436;
            line-height: 1.3;
            letter-spacing: -0.5px;
        }

        .btn-container {
            position: relative;
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
        }

        button {
            padding: 18px 45px;
            border-radius: 18px;
            border: none;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        #yes-btn {
            background: var(--primary);
            color: white;
            z-index: 100;
        }

        #no-btn {
            background: #ffffff;
            color: #a4b0be;
        }

        /* SUCCESS SCREEN */
        #success-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 92%;
            max-width: 420px;
            animation: slideUp 0.8s ease;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 25px;
            box-shadow: var(--shadow);
            width: 100%;
            position: relative;
        }

        .img-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 25px;
            background: #eee;
        }

        .img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 25px;
        }

        /* ELEGANT DRAWN HEART */
        .heart-border {
            position: absolute;
            top: -12px;
            left: -12px;
            width: calc(100% + 24px);
            height: calc(100% + 24px);
            fill: none;
            stroke: var(--primary);
            stroke-width: 10;
            stroke-linecap: round;
            stroke-dasharray: 1600;
            stroke-dashoffset: 1600;
            z-index: 10;
            filter: drop-shadow(0 0 12px rgba(255, 51, 102, 0.6));
        }

        @keyframes drawLine {
            to { stroke-dashoffset: 0; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #final-text {
            margin-top: 25px;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
            min-height: 60px;
            line-height: 1.3;
        }

        .sparkle {
            position: absolute;
            pointer-events: none;
            animation: fly 4s linear forwards;
        }

        @keyframes fly {
            0% { transform: translateY(0) scale(0); opacity: 1; }
            100% { transform: translateY(-110vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="entry-screen">
        <div id="typewriter"></div>
        <div class="btn-container">
            <button id="yes-btn" onclick="openHeart()">YES</button>
            <button id="no-btn" onmouseover="dodgeNo()" onclick="dodgeNo()">NO</button>
        </div>
    </div>

    <div id="success-screen">
        <div class="glass-card">
            <div class="img-wrapper">
                <svg class="heart-border" id="heart-svg" viewBox="0 0 500 500">
