<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Girl</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Special+Elite&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        body {
            margin: 0;
            background-color: #fff0f3; /* Soft Pink Vibe */
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        /* The Box where everything happens */
        .container {
            width: 90%;
            max-width: 400px;
            z-index: 10;
        }

        /* Typewriter styling */
        #question-text, #final-text {
            font-family: 'Special Elite', serif;
            font-size: 1.5rem;
            color: #5c5470;
            min-height: 80px;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        /* Buttons */
        .btn-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            height: 100px;
        }

        button {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s all ease;
            font-size: 1rem;
        }

        #yes-btn {
            background-color: #ff4d6d;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }

        #no-btn {
            background-color: #ced4da;
            color: #495057;
        }

        /* The Photo Frame */
        #success-screen {
            display: none;
        }

        .polaroid {
            background: white;
            padding: 15px 15px 60px 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transform: rotate(-3deg);
            margin-bottom: 20px;
            display: inline-block;
            animation: fadeIn 1.5s ease;
        }

        .polaroid img {
            width: 250px;
            height: 250px;
            object-fit: cover;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8) rotate(0deg); }
            to { opacity: 1; transform: scale(1) rotate(-3deg); }
        }

        /* Floating Hearts */
        .heart {
            position: absolute;
            color: #ff8fa3;
            font-size: 1.5rem;
            pointer-events: none;
            animation: moveUp 4s linear forwards;
        }

        @keyframes moveUp {
            0% { transform: translateY(100vh) scale(0.5); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="entry-screen" class="container">
        <div id="question-text"></div>
        <div class="btn-group">
            <button id="yes-btn" onclick="startSuccess()">YES</button>
            <button id="no-btn" onmouseover="moveNo()" onclick="moveNo()">NO</button>
        </div>
    </div>

    <div id="success-screen" class="container">
        <div class="polaroid">
            <img src="us.jpg" alt="Our Picture">
        </div>
        <div id="final-text"></div>
    </div>

    <script>
        // TYPEWRITER FOR QUESTION
        const qStr = "Q) Do you still love rajuttan, Be honest.";
        let qIdx = 0;
        function typeQ() {
            if (qIdx < qStr.length) {
                document.getElementById("question-text").innerHTML += qStr.charAt(qIdx);
                qIdx++;
                setTimeout(typeQ, 70);
            }
        }
        window.onload = typeQ;

        // THE SHRINKING NO BUTTON
        let noScale = 1;
        let yesScale = 1;
        function moveNo() {
            const noBtn = document.getElementById('no-btn');
            const yesBtn = document.getElementById('yes-btn');
            noScale -= 0.15;
            yesScale += 0.15;
            
            if (noScale <= 0.3) {
                noBtn.style.display = 'none';
            } else {
                noBtn.style.transform = `scale(${noScale})`;
            }
            yesBtn.style.transform = `scale(${yesScale})`;
            createHeart();
        }

        // THE SUCCESS SCENE
        function startSuccess() {
            document.getElementById('entry-screen').style.display = 'none';
            document.getElementById('success-screen').style.display = 'block';
            typeFinal();
            setInterval(createHeart, 300);
        }

        const fStr = "I knew you were obsessed with rajuttan, kalli penne!";
        let fIdx = 0;
        function typeFinal() {
            if (fIdx < fStr.length) {
                document.getElementById("final-text").innerHTML += fStr.charAt(fIdx);
                fIdx++;
                setTimeout(typeFinal, 60);
            }
        }

        function createHeart() {
            const h = document.createElement('div');
            h.className = 'heart';
            h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.top = '100vh';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 4000);
        }
    </script>
</body>
</html>
