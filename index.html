<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be Honest...</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fff5f8;
            --accent-color: #ff4d6d;
            --text-color: #4a4e69;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            text-align: center;
        }

        #entry-screen, #success-screen {
            transition: opacity 0.5s ease;
        }

        #success-screen {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--text-color);
            font-size: 2rem;
            margin-bottom: 2rem;
        }

        .btn-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            min-height: 100px;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            font-weight: bold;
        }

        #yes-btn {
            background-color: var(--accent-color);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.3);
        }

        #no-btn {
            background-color: #dee2e6;
            color: #6c757d;
        }

        .main-text {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            color: var(--accent-color);
            margin-top: 20px;
        }

        /* Floating elements */
        .floating {
            position: absolute;
            font-size: 2rem;
            animation: float 6s infinite ease-in-out;
            z-index: -1;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .bear {
            font-size: 100px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div id="entry-screen">
        <h1>Q) Do you still love rajuttan, <br>Be honest.</h1>
        <div class="btn-container">
            <button id="yes-btn" onclick="celebrate()">YES</button>
            <button id="no-btn" onclick="shrinkNo()">NO</button>
        </div>
    </div>

    <div id="success-screen">
        <div class="bear">🧸🌹</div>
        <div class="main-text">I knew you were always obsessed with Rajuttan, kalli pennee!</div>
    </div>

    <script>
        let noScale = 1;
        let yesScale = 1;

        function shrinkNo() {
            const noBtn = document.getElementById('no-btn');
            const yesBtn = document.getElementById('yes-btn');
            
            // Shrink the NO button
            noScale -= 0.15;
            if (noScale < 0.2) {
                noBtn.style.display = 'none'; // Disappear eventually
            } else {
                noBtn.style.transform = `scale(${noScale})`;
            }

            // Grow the YES button slightly to make it more enticing
            yesScale += 0.1;
            yesBtn.style.transform = `scale(${yesScale})`;
        }

        function celebrate() {
            document.getElementById('entry-screen').style.display = 'none';
            document.getElementById('success-screen').style.display = 'flex';
            
            // Create floating hearts and roses
            setInterval(createFloatingEmoji, 300);
        }

        function createFloatingEmoji() {
            const emojis = ['❤️', '🌹', '💖', '✨', '🌸'];
            const emoji = document.createElement('div');
            emoji.className = 'floating';
            emoji.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
            emoji.style.left = Math.random() * 100 + 'vw';
            emoji.style.animationDuration = (Math.random() * 3 + 3) + 's';
            document.body.appendChild(emoji);

            setTimeout(() => {
                emoji.remove();
            }, 6000);
        }
    </script>
</body>
</html>
